services:
  - type: web
    name: pluggedin-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    disk:
      name: pluggedin-storage
      mountPath: /var/www/html/storage
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: pluggedin-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: pluggedin-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: pluggedin-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: pluggedin-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: pluggedin-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pluggedin-db
          property: password
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: public
      - key: RUN_SEEDERS_ON_BOOT
        value: "true"
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: APP_LOCALE
        value: en
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_FAKER_LOCALE
        value: en_US

databases:
  - name: pluggedin-db
